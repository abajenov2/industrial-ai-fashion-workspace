policy_version: 0.3.0
policy_status: draft
workspace_model: unified_resident_workspace
owner_context_source: 00_Паспорт_рабочего_места/Контекст_владельца.md
roles_source: 01_Роль_и_траектория/roles.yaml
separate_axes:
  - owner
  - organization_contexts
  - roles
  - programs_and_contours
  - access_and_authority
sources_of_truth:
  public_and_resident_standard: alliance_platform
  structured_statuses: agreed_registry
  private_work: local_workspace
access_levels:
  public: reusable_after_review
  resident: active_residents_only
  private: workspace_owner_only
  temporary: local_processing_only
  pending_rights: do_not_share
external_actions:
  publish: explicit_approval_required
  message: explicit_approval_required
  upload: explicit_approval_required
  change_access: explicit_approval_required
prohibited_in_repository:
  - passwords
  - api_tokens
  - cookies
  - payment_data
  - contact_databases
  - unapproved_raw_transcripts
  - third_party_private_correspondence
membership:
  source_of_truth: alliance_registry
  trial_days: 30
  expiry_action: revoke_repository_access
role_configuration:
  multiple_roles_allowed: true
  reinstall_on_role_change: false
  elevated_authority_requires_separate_verification: true
update_contract:
  install_requires_new_or_empty_target: true
  existing_workspace_first_mode: library_only
  existing_workspace_requires_dry_run: true
  preserve_existing_destination_until_staging_valid: true
  rollback_on_swap_failure: true
  compare_owner_file_hashes_before_and_after: true
  onedrive_unicode_failure_action: create_isolated_temp_test_and_report
  explicit_old_release_action: record_version_conflict_and_isolate_test
knowledge_navigation:
  entrypoint: KA6
  trajectory_reference: RLTR
  ka_standard_maintainer_role: architect
docka:
  distribution: selective_from_managed_yandex_disk
  full_archive_in_common_github: false
  require_source_metadata:
    - docka_id
    - ka
    - author
    - alliance_page
    - version
    - sha256
    - received_at
notice: Revoking GitHub access does not delete local clones; contractual restrictions remain in force.
