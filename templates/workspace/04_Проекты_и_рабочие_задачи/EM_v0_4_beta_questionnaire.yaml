id: EM-QUESTIONNAIRE-0.4
title: "Эталонная марка: beta-анкета"
version: 0.4-beta
status: preview
access: private
updated_at: 2026-07-19
delivery:
  codex: "Заполняет постепенно в личном рабочем месте и не просит лишних документов."
  yandex_form: "Собирает первичную самодиагностику без файлов, P&L, договоров и клиентских баз."
  estimated_time_minutes: 20
published_beta_form:
  url: "https://forms.yandex.ru/u/6a5d189cd04688838d6d61fc"
  question_count: 21
  required_questions: []
  note: >-
    Публичная beta-форма объединяет часть детальных вопросов в один открытый
    ответ. Пропуск допустим и не равен нулевой оценке. Полная структура ниже
    применяется локально с Codex или при следующей версии формы.
privacy:
  raw_answers: private
  full_spider: private
  exchange_card: resident_with_explicit_consent
  public_case: explicit_consent_after_action
answer_statuses:
  known: "Есть ответ или достаточный пример."
  unknown: "Нет данных или человек пока не знает. Не равно нулю."
  not_applicable: "Вопрос не относится к марке сейчас. Исключается из покрытия."
  deferred: "Человек вернется к вопросу позже. Не входит в зрелость."

form:
  title: "Эталонная марка: первичная карта beta"
  description: >-
    Это не экзамен и не готовый диагноз. Карта помогает выбрать одну ближайшую
    задачу и понять, какие факты, документы, люди или решения нужны дальше.
    Не загружайте сюда финансовые таблицы, договоры, клиентские базы и другие
    чувствительные файлы. Можно отвечать «пока не знаю» или пропускать вопрос.
  questions:
    - id: EM.00.01
      section: "Начало"
      human_question: "Как называется ваша марка?"
      type: short_text
      required: true
      system_collects: "Идентификатор организационного контекста."
      spider: null

    - id: EM.00.02
      section: "Начало"
      human_question: "Как к вам обращаться и где удобнее продолжить разговор?"
      help: "Напишите имя и Telegram, email или другой удобный контакт."
      type: short_text
      required: true
      system_collects: "Ответственный за ответы и допустимый канал следующего такта."
      spider: null

    - id: EM.00.03
      section: "Начало"
      human_question: "Дайте ссылку на профиль, сайт, магазин или проект марки, если он уже есть."
      type: short_text
      required: false
      system_collects: "Связь с существующим публичным или резидентским следом."
      spider: null

    - id: EM.00.04
      section: "Начало"
      human_question: "Понимаете ли вы, что это самодиагностика, а спорные выводы нужно проверять отдельно?"
      type: single_choice
      required: true
      options: ["Да", "Нет"]
      system_collects: "Граница автоматического вывода."
      spider: null

    - id: EM.00.05
      section: "Начало"
      human_question: "Кто может видеть ваши ответы?"
      help: "Полная карта остается у вас. Куратор или эксперт получает только то, что вы отдельно разрешите для задачи."
      type: single_choice
      required: true
      options:
        - "Только я"
        - "Я и куратор программы"
        - "Я, куратор и эксперт, которого я отдельно выберу"
      system_collects: "Граница доступа к первичному следу."
      spider: null

    - id: EM.01.01
      section: "Марка и задача"
      human_question: "Что вы сейчас делаете и продаете?"
      help: "Назовите основные категории, обычную цену вещи и рынки или города, где уже работаете."
      type: long_text
      required: true
      system_collects: "Продуктовая граница, ценовой сегмент, география."
      spider: null

    - id: EM.01.02
      section: "Марка и задача"
      human_question: "Какую работу в марке вы реально держите сами?"
      help: "Например: «придумываю коллекцию и веду производство» или «отвечаю за продажи и деньги»."
      type: long_text
      required: true
      system_collects: "Реальная роль и совмещение функций."
      spider: null

    - id: EM.01.03
      section: "Марка и задача"
      human_question: "Что сейчас ближе всего к вашей ситуации?"
      type: single_choice
      required: true
      options:
        - value: "first_product"
          label: "Готовлю первый продукт или первые продажи"
        - value: "founder_led_sales"
          label: "Уже продаю, но почти все держится на мне"
        - value: "regular_sales_team"
          label: "Есть регулярные продажи и команда"
        - value: "multi_channel_system"
          label: "Есть несколько каналов и более сложная система"
        - value: "other"
          label: "Другое / не уверен(а)"
      system_collects: "Гипотеза стадии для глубины следующего такта, не рейтинг."
      spider: null

    - id: EM.01.04
      section: "Марка и задача"
      human_question: "Какая одна задача сейчас важнее всего?"
      help: "Например: увеличить прибыль, собрать коллекцию, наладить производство, открыть канал, понять аудиторию, подготовиться к разговору с байером, собрать команду."
      type: long_text
      required: true
      system_collects: "Ближайшая цель и JTBD маршрута."
      spider: null

    - id: EM.01.05
      section: "Марка и задача"
      human_question: "Как вы поймете, что задача решена?"
      help: "Какая цифра, решение или изменение в работе должно появиться?"
      type: long_text
      required: true
      system_collects: "Наблюдаемый результат цели."
      spider: null

    - id: EM.01.06
      section: "Марка и задача"
      human_question: "Что случится, если решение отложить или ошибиться?"
      type: multiple_choice
      required: true
      options: ["Деньги", "Остатки", "Срок", "Канал", "Команда", "Репутация", "Другое", "Пока не знаю"]
      system_collects: "Цена ошибки и ограничение текущего такта."
      spider: null

    - id: EM.01.07
      section: "Марка и задача"
      human_question: "К какому времени нужно принять решение или увидеть первый результат?"
      type: short_text
      required: false
      system_collects: "Срок и срочность следующего действия."
      spider: null

    - id: EM.KA1.01
      section: "Решения, деньги и команда"
      human_question: "Когда решаете запускать коллекцию, канал или найм, на что обычно опираетесь?"
      type: single_choice
      required: true
      options:
        - value: 0
          label: "В основном на интуицию, память или остаток денег"
        - value: 1
          label: "На отдельные цифры, сообщения или разрозненные файлы"
        - value: 2
          label: "На рабочую таблицу или расчет"
        - value: 3
          label: "На регулярно обновляемый план-факт, по которому принимаем решения"
        - value: unknown
          label: "Пока не знаю / не могу оценить"
      system_collects: "Наличие и рабочее использование финансово-управленческой картины."
      spider:
        zone: KA1
        parameter: decision_basis
        score_map: {"0": 0, "1": 1, "2": 2, "3": 3}
        unknown_values: [unknown]

    - id: EM.KA1.02
      section: "Решения, деньги и команда"
      human_question: "Когда пробуете новый продукт, канал или рекламу, заранее понятно, при каком результате продолжите, измените или остановите попытку?"
      type: single_choice
      required: true
      options:
        - value: 0
          label: "Нет, решаем уже по ходу"
        - value: 1
          label: "Иногда договариваемся устно"
        - value: 2
          label: "Обычно фиксируем критерий и ответственного"
        - value: 3
          label: "Всегда есть критерий, дата проверки и следующий вариант действия"
        - value: unknown
          label: "Пока не знаю / не относится"
      system_collects: "Критерий продолжения, изменения или остановки гипотезы."
      spider:
        zone: KA1
        parameter: experiment_rhythm
        score_map: {"0": 0, "1": 1, "2": 2, "3": 3}
        unknown_values: [unknown]

    - id: EM.KA2.01
      section: "Покупатель, вещь и обещание марки"
      human_question: "Откуда вы знаете, кто и зачем покупает вашу марку?"
      type: multiple_choice
      required: true
      options: ["Продажи", "Повторные клиенты", "Переписка", "Продавцы или точки продаж", "Исследования", "Аналитика", "Пока в основном интуиция", "Пока не знаю"]
      system_collects: "Доказательность знания аудитории и контекста выбора."
      spider:
        zone: KA2
        parameter: audience_evidence
        interpretation: "Интерпретировать источник знания, а не обещать точный балл без примера."

    - id: EM.KA2.02
      section: "Покупатель, вещь и обещание марки"
      human_question: "Выберите одну вещь или дроп, на котором лучше всего видно вашу марку."
      help: "Кому и в какой ситуации он нужен? За что здесь платят? Где его легче всего продать? Можно ответить коротко по пунктам."
      type: long_text
      required: true
      system_collects: "Связность между покупателем, продуктом, ценой и каналом; конкретная гипотеза ценности."
      spider:
        zone: KA2
        parameter: product_promise_translation
        interpretation: "Проверить, продолжают ли ответы друг друга; если сведений нет, статус unknown."

    - id: EM.KA3.01
      section: "Продвижение и обратная связь"
      human_question: "Как вы обычно понимаете, сработала ли реклама, съемка, событие, пост или рассылка?"
      type: single_choice
      required: true
      options:
        - value: 0
          label: "Обычно не можем понять точно"
        - value: 1
          label: "Смотрим охваты, лайки или общее ощущение"
        - value: 2
          label: "Сравниваем отдельную активность с ожидаемым результатом"
        - value: 3
          label: "Регулярно тестируем, сравниваем и меняем план"
        - value: unknown
          label: "Пока не делали таких активностей / не знаю"
      system_collects: "Управляемость маркетингового теста и обратной связи."
      spider:
        zone: KA3
        parameter: marketing_feedback_loop
        score_map: {"0": 0, "1": 1, "2": 2, "3": 3}
        unknown_values: [unknown]

    - id: EM.KA3.02
      section: "Продвижение и обратная связь"
      human_question: "Вспомните последнюю активность: чего ждали, что получилось и что сделали после этого?"
      type: long_text
      required: false
      system_collects: "Пример фактического цикла гипотеза -> результат -> корректировка."
      spider:
        zone: KA3
        parameter: marketing_trace
        interpretation: "Уточняет уверенность, не подменяет отсутствие ответа нулем."

    - id: EM.KA4.01
      section: "Ассортимент и производство"
      human_question: "Как вы передаете модель в производство?"
      help: "Есть ли ТЗ или техкарта, кто отвечает на вопросы фабрики, как контролируете сроки и качество?"
      type: single_choice
      required: true
      options:
        - value: 0
          label: "В основном через переписку и устные договоренности"
        - value: 1
          label: "По части моделей есть материалы, но процесс часто сбоит"
        - value: 2
          label: "Есть рабочие ТЗ или техкарты и понятный ответственный"
        - value: 3
          label: "Документы, календарь и контроль качества регулярно работают вместе"
        - value: unknown
          label: "Пока не производим / не знаю"
      system_collects: "Готовность передавать продукт в производство и управлять циклом."
      spider:
        zone: KA4
        parameter: production_handoff
        score_map: {"0": 0, "1": 1, "2": 2, "3": 3}
        unknown_values: [unknown]

    - id: EM.KA4.02
      section: "Ассортимент и производство"
      human_question: "Когда выбираете, что запускать, докупать или снимать, на что смотрите в первую очередь?"
      type: multiple_choice
      required: true
      options: ["Продажи", "Маржа", "Возвраты", "Остатки", "Спрос", "Мнение команды", "Пока в основном интуиция", "Пока не знаю"]
      system_collects: "Информационная модель ассортимента и факт для решений по SKU."
      spider:
        zone: KA4
        parameter: assortment_decisions
        interpretation: "Источники данных и их регулярность оцениваются по ответу и примеру."

    - id: EM.KA5.01
      section: "Продажи, каналы и партнеры"
      human_question: "Как у вас устроены каналы продаж?"
      help: "Перечислите, где продаете сейчас, зачем нужен каждый канал и по какому из них меньше всего уверены в деньгах."
      type: long_text
      required: true
      system_collects: "Архитектура каналов, их роль и фактическая экономика."
      spider:
        zone: KA5
        parameter: channel_economics
        interpretation: "Проверить наличие роли канала и учета комиссии, логистики, возвратов, хранения, рекламы и маржи там, где применимо."

    - id: EM.KA5.02
      section: "Продажи, каналы и партнеры"
      human_question: "Если завтра позовет конкретный байер или универмаг, что уже сможете ему отправить?"
      type: multiple_choice
      required: true
      options: ["Краткий рассказ о марке", "Выборку моделей", "Цены", "Условия", "Сроки поставки", "Company Profile", "Linesheet", "Пока ничего из этого не собрано", "Это пока не моя задача"]
      system_collects: "Готовность к конкретному партнерскому каналу; это не универсальная оценка марки."
      spider:
        zone: KA5
        parameter: partner_readiness
        interpretation: "Не применимо для марки без текущего запроса на этот канал."

    - id: EM.X.01
      section: "Рабочие материалы"
      human_question: "Какие материалы у вас уже есть и используются в работе?"
      help: "Отметьте подходящее: план развития, описание марки, план продвижения, ассортиментная таблица, план продаж, Company Profile, другое."
      type: multiple_choice
      required: false
      options: ["План развития", "Описание марки", "План продвижения", "Ассортиментная таблица", "План продаж", "Company Profile", "Другое", "Пока ничего из этого"]
      system_collects: "Наличие рабочих артефактов, владельцев и исходной точки для DocKA."
      spider: null

    - id: EM.X.02
      section: "Рабочие материалы"
      human_question: "Покажите одну публикацию, проект, отзыв или совместную работу, которыми готовы подтвердить опыт марки."
      type: short_text
      required: false
      system_collects: "Согласованный цифровой след; ссылка не делает материал публичным автоматически."
      spider: null

    - id: EM.X.03
      section: "Обмен опытом"
      human_question: "Чем вы могли бы быть полезны другой роли или марке сейчас?"
      type: long_text
      required: false
      system_collects: "Часть будущей H.exchange-карточки."
      spider: null

    - id: EM.X.04
      section: "Обмен опытом"
      human_question: "Кого или что вы ищете для своей задачи?"
      help: "Например: эксперта по каналу, фабрику, байера, партнера, шаблон, разбор на Лаборатории."
      type: long_text
      required: false
      system_collects: "Требуемая компетенция, формат первого контакта и маршрут KA6."
      spider: null

    - id: EM.END.01
      section: "Следующий шаг"
      human_question: "Что из описанного сейчас сильнее всего мешает вашей ближайшей задаче?"
      type: long_text
      required: true
      system_collects: "Один приоритетный разрыв, связанный с целью."
      spider: null

    - id: EM.END.02
      section: "Следующий шаг"
      human_question: "Какой первый шаг вам сейчас реалистичен?"
      type: single_choice
      required: true
      options: ["Собрать цифры", "Открыть шаблон", "Обсудить на Лаборатории", "Проверить с экспертом", "Познакомиться с партнером", "Запустить малый пилот", "Другое"]
      system_collects: "Формат следующего такта."
      spider: null

    - id: EM.END.03
      section: "Следующий шаг"
      human_question: "Кто сделает этот первый шаг и к какой дате?"
      type: short_text
      required: true
      system_collects: "Владелец действия и дата повторного замера."
      spider: null

optional_module:
  id: EM.KA2U
  title: "Карта различимости марки"
  entry_condition: "Открывать после базовой карты только по желанию владельца или при задаче KA2."
  note: "Это не рейтинг уникальности и не обязательная часть быстрой формы."
  human_questions:
    - "В какой конкретный момент человек должен вспомнить о вашей марке?"
    - "Какие еще марки, вещи или привычные решения он в этот момент рассматривает?"
    - "Закончите фразу: «В этой ситуации нас выбирают, потому что ...»"
    - "На каких вещах, деталях, материалах, ценах или сервисных решениях это уже видно?"
    - "Где это видно вне самой вещи: сайт, съемка, упаковка, магазин, разговор продавца или презентация байеру?"
    - "Как сможете проверить эту гипотезу в ближайший месяц?"
  system_collects: "Проверяемая различимость в ситуации выбора и способ ограниченного теста."
