name: Validate workspace installers

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: [person, organization, multi_role, governance_boundary]
    steps:
      - uses: actions/checkout@v4
      - name: Install workspace
        run: bash install.sh "$RUNNER_TEMP/${{ matrix.scenario }}-workspace"
      - name: Check required files
        run: |
          ROOT="$RUNNER_TEMP/${{ matrix.scenario }}-workspace"
          test -f "$ROOT/AGENTS.md"
          test -f "$ROOT/00_Паспорт_рабочего_места/Паспорт_рабочего_места.md"
          test -f "$ROOT/01_Роль_и_траектория/Мои_роли_RL.md"
          test -f "$ROOT/01_Роль_и_траектория/roles.yaml"
          test -f "$ROOT/03_Библиотека_роли/01_Открытый_стандарт/Свод_знаний_репозиторий/VERSION.json"
          test -f "$ROOT/03_Библиотека_роли/01_Открытый_стандарт/Свод_знаний_репозиторий/Статьи/KA1/003_KA1.2_post-3869.md"
          test -f "$ROOT/03_Библиотека_роли/01_Открытый_стандарт/Система_Альянса/navigation/START_HERE.md"
          test -f "$ROOT/03_Библиотека_роли/01_Открытый_стандарт/Система_Альянса/journeys/machine/cjm-index.yaml"
          test ! -f "$ROOT/00_Паспорт_рабочего_места/Тип_рабочего_места.md"
      - name: Update shared layer without changing owner data
        run: |
          ROOT="$RUNNER_TEMP/${{ matrix.scenario }}-workspace"
          printf 'owner-data-must-survive\n' >> "$ROOT/00_Паспорт_рабочего_места/Паспорт_рабочего_места.md"
          rm "$ROOT/03_Библиотека_роли/01_Открытый_стандарт/Система_Альянса/navigation/START_HERE.md"
          bash update-library.sh "$ROOT"
          grep -q 'owner-data-must-survive' "$ROOT/00_Паспорт_рабочего_места/Паспорт_рабочего_места.md"
          test -f "$ROOT/03_Библиотека_роли/01_Открытый_стандарт/Система_Альянса/navigation/START_HERE.md"

  windows-install:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        scenario: [person, organization, multi_role, governance_boundary]
    steps:
      - uses: actions/checkout@v4
      - name: Install workspace
        shell: powershell
        run: .\install.ps1 -Target "$env:RUNNER_TEMP\${{ matrix.scenario }}-workspace"
      - name: Check required files
        shell: pwsh
        run: |
          $Root = "$env:RUNNER_TEMP\${{ matrix.scenario }}-workspace"
          if (-not (Test-Path -LiteralPath "$Root\AGENTS.md")) { throw "AGENTS.md is missing" }
          if (-not (Test-Path -LiteralPath "$Root\00_Паспорт_рабочего_места\Паспорт_рабочего_места.md")) { throw "Passport is missing" }
          if (-not (Test-Path -LiteralPath "$Root\01_Роль_и_траектория\Мои_роли_RL.md")) { throw "Role registry is missing" }
          if (-not (Test-Path -LiteralPath "$Root\01_Роль_и_траектория\roles.yaml")) { throw "Machine role registry is missing" }
          if (-not (Test-Path -LiteralPath "$Root\03_Библиотека_роли\01_Открытый_стандарт\Свод_знаний_репозиторий\VERSION.json")) { throw "Knowledge Base is missing" }
          if (-not (Test-Path -LiteralPath "$Root\03_Библиотека_роли\01_Открытый_стандарт\Свод_знаний_репозиторий\Статьи\KA1\003_KA1.2_post-3869.md")) { throw "KA1.2 is missing" }
          if (-not (Test-Path -LiteralPath "$Root\03_Библиотека_роли\01_Открытый_стандарт\Система_Альянса\navigation\START_HERE.md")) { throw "System navigator is missing" }
          if (-not (Test-Path -LiteralPath "$Root\03_Библиотека_роли\01_Открытый_стандарт\Система_Альянса\journeys\machine\cjm-index.yaml")) { throw "CJM index is missing" }
          if (Test-Path -LiteralPath "$Root\00_Паспорт_рабочего_места\Тип_рабочего_места.md") { throw "Deprecated workspace type found" }
      - name: Update shared layer without changing owner data
        shell: pwsh
        run: |
          $Root = "$env:RUNNER_TEMP\${{ matrix.scenario }}-workspace"
          Add-Content -LiteralPath "$Root\00_Паспорт_рабочего_места\Паспорт_рабочего_места.md" -Value "owner-data-must-survive"
          Remove-Item -LiteralPath "$Root\03_Библиотека_роли\01_Открытый_стандарт\Система_Альянса\navigation\START_HERE.md"
          powershell -ExecutionPolicy Bypass -File .\update-library.ps1 -Target $Root
          if (-not (Select-String -LiteralPath "$Root\00_Паспорт_рабочего_места\Паспорт_рабочего_места.md" -Pattern "owner-data-must-survive" -Quiet)) { throw "Owner data was overwritten" }
          if (-not (Test-Path -LiteralPath "$Root\03_Библиотека_роли\01_Открытый_стандарт\Система_Альянса\navigation\START_HERE.md")) { throw "System navigation was not restored" }
